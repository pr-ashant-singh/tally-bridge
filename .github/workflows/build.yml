name: Build Windows Exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller tallybridge.spec

      - name: Verify exe exists
        run: |
          dir dist\TallyBridge.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TallyBridge-windows
          path: dist/TallyBridge.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TallyBridge.exe
          name: TallyBridge ${{ github.ref_name }}
          body: |
            ## TallyBridge ${{ github.ref_name }}
            
            Convert Zerodha Tax P&L Excel/PDF reports into Tally-compatible import files.
            
            ### Download
            Download `TallyBridge.exe` below and double-click to run. No installation needed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
